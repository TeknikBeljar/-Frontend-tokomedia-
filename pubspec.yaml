name: tokomedia
description: Tokomedia Flutter commerce app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  http_parser: ^4.1.2
  image_picker: ^1.2.2
  mime: ^2.0.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/products/mobile/
    - assets/images/web_ref/
